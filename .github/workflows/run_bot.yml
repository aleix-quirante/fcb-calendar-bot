name: Sincronizador Cule Diario

on:
  schedule:
    # Se ejecuta cada hora (00, 01, 02...) para mantener actualizadas las
    # probabilidades a cada hora, y por consiguiente a las 6h, 3h, 2h y 1h antes del partido.
    - cron: '0 * * * *'
  workflow_dispatch: # Permite darle al botón de "Play" manual

env:
  # Proactively migrate to Node.js 24 to avoid deprecation warnings
  # Node.js 20 actions are deprecated and will be removed September 16th, 2026
  # Setting this environment variable opts into Node.js 24 now
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install .
          echo "Dependencies installed successfully from pyproject.toml"

      - name: Verificar instalación de dependencias
        run: |
          python -c "
          import requests
          import icalendar
          import googleapiclient.discovery
          import google.auth.transport.requests
          import google.oauth2.credentials
          import pydantic
          import httpx
          import feedparser
          import openai
          import bs4
          import lxml
          import cachetools
          print('All required packages are installed')
          "

      - name: Ejecutar script del Barça y Sincronizar Google Calendar
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          set -e
          echo "Starting bot execution..."
          python bot_barca.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Bot executed successfully"
          else
            echo "Bot failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

      - name: Hacer commit y push (Pintar de verde)
        run: |
          git config --global user.name "Aleix Quirante"
          git config --global user.email "quirante70@gmail.com"
          git add log_partidos.md
          git commit -m "⚽ Barça Bot: Sincronización diaria completada $(date +'%Y-%m-%d')" || exit 0
          git push
